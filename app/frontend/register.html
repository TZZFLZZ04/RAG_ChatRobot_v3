<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册账号 | ChatRobot Enterprise RAG</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Enterprise RAG Workspace</p>
          <h1>先创建账号，再回到登录页进入你的知识工作台。</h1>
          <p class="hero-copy">
            注册完成后会自动返回登录页面。你可以立刻使用刚创建的账号登录，开始管理自己的知识库与文档。
          </p>
        </div>
        <div class="hero-side">
          <div class="hero-actions">
            <a class="ghost-button link-button" href="/">返回登录</a>
          </div>
        </div>
      </header>

      <section id="registerNotice" class="session-notice hidden"></section>

      <section class="auth-shell">
        <form id="registerStandaloneForm" class="panel auth-panel auth-panel-compact">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Register</p>
              <h2>注册账号</h2>
            </div>
          </div>
          <p class="auth-intro">填写用户名、邮箱和密码。注册成功后会回到登录页，不会直接替你登录。</p>
          <div class="field">
            <span>用户名</span>
            <input id="registerStandaloneUsernameInput" type="text" maxlength="50" placeholder="例如：alice" />
          </div>
          <div class="field">
            <span>邮箱</span>
            <input
              id="registerStandaloneEmailInput"
              type="email"
              maxlength="255"
              placeholder="例如：alice@example.com"
            />
          </div>
          <div class="field">
            <span>密码</span>
            <input id="registerStandalonePasswordInput" type="password" maxlength="128" placeholder="至少 6 位" />
          </div>
          <button class="accent-button" type="submit">注册账号</button>
          <div class="auth-link-row">
            <span>已经有账号？</span>
            <a class="text-link" href="/">返回登录</a>
          </div>
        </form>
      </section>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="/static/register.js"></script>
  </body>
</html>
