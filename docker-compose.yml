services:
  api:
    build: .
    container_name: chatrobot-api
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MILVUS_HOST: milvus
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    container_name: chatrobot-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --pool=solo
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MILVUS_HOST: milvus
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: chatrobot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatrobot
      POSTGRES_PASSWORD: chatrobot
      POSTGRES_DB: chatrobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatrobot -d chatrobot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: chatrobot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  etcd:
    profiles: ["milvus"]
    image: quay.io/coreos/etcd:v3.5.18
    container_name: chatrobot-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    profiles: ["milvus"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: chatrobot-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9090:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    profiles: ["milvus"]
    image: milvusdb/milvus:v2.5.10
    container_name: chatrobot-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
